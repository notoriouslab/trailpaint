      <section style="max-width:720px;margin:2rem auto;padding:1.5rem;font-family:Georgia,serif;color:#78350f;">
        <h1>TrailPaint 路小繪 — Editor</h1>
        <p>TrailPaint 是一個<strong>手繪風路線地圖製作工具</strong>。Editor 在真實地圖上畫路線、放景點、加照片，匯出手繪插畫風地圖。</p>
        <h2>三種建立路線的方式</h2>
        <ul>
          <li><strong>從照片</strong>：拖 20 張照片進來，EXIF GPS 自動建景點（JPEG/HEIC）</li>
          <li><strong>在地圖上手動</strong>：搜尋地點、畫路線、放景點卡片</li>
          <li><strong>用 AI 生成</strong>：複製提示詞給 ChatGPT / Claude，產出可匯入的 JSON</li>
        </ul>
        <h2>匯入格式</h2>
        <p>.trailpaint 專案檔、照片 EXIF（JPEG/HEIC）、KML（Google My Maps）、GeoJSON（geojson.io / Google Takeout）、GPX 軌跡、截圖底圖。</p>
        <h2>輸出格式</h2>
        <p>PNG 多比例插畫（IG / Story / 4:3）、.trailpaint 完整備份、GeoJSON / KML（給 Google Earth / Gaia GPS）、分享連結、Player 嵌入碼。</p>
        <p>請啟用 JavaScript 以使用完整 Editor 功能，或前往 <a href="https://trailpaint.org/">TrailPaint 首頁</a> 了解更多。</p>
      </section>
