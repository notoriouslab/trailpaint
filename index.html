<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TrailPaint 路小繪 — 手繪風路線地圖工具</title>

  <meta property="og:title" content="TrailPaint 路小繪"/>

  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="icon" type="image/svg+xml" href="/app/favicon.svg"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#1c0a00;
      color:#fde68a;
      font-family: Georgia, 'Noto Serif TC', serif;
      min-height:100vh;
    }

    .hero {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:2rem 1.5rem;
      text-align:center;
    }

    .logo { font-size:64px; margin-bottom:0.5rem; }

    h1 {
      font-size:2.2rem;
      font-weight:700;
      margin-bottom:0.5rem;
      letter-spacing:0.02em;
    }

    .tagline {
      font-size:1.1rem;
      color:#d4a574;
      margin-bottom:2rem;
      line-height:1.6;
    }

    .example-img {
      width:100%;
      max-width:560px;
      border-radius:12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      margin-bottom:2rem;
    }

    .features {
      display:flex;
      flex-wrap:wrap;
      gap:1rem;
      justify-content:center;
      margin-bottom:2.5rem;
      max-width:560px;
    }

    .feat {
      background:rgba(253,230,138,0.08);
      border:1px solid rgba(253,230,138,0.15);
      border-radius:8px;
      padding:0.5rem 1rem;
      font-size:0.95rem;
      color:#fde68a;
    }

    .cta {
      display:inline-block;
      background:#78350f;
      color:#fde68a;
      text-decoration:none;
      font-size:1.2rem;
      font-weight:700;
      padding:0.9rem 2.5rem;
      border-radius:10px;
      transition: background 0.2s, transform 0.15s;
      margin-bottom:1.5rem;
    }
    .cta:hover { background:#92400e; transform:translateY(-1px); }

    .links {
      font-size:0.9rem;
      color:#a08060;
    }
    .links a {
      color:#d4a574;
      text-decoration:none;
      border-bottom:1px solid rgba(212,165,116,0.3);
    }
    .links a:hover { border-bottom-color:#d4a574; }

    .footer {
      padding:1.5rem;
      text-align:center;
      font-size:0.8rem;
      color:#6b5540;
    }

<body>
  <div class="hero">

    <img class="example-img" src="examples/trailpaint-map.jpg"
         alt="TrailPaint 範例 — 白石湖步道路線圖"/>

    <div class="features">
      <span class="feat">📍 景點卡片</span>
      <span class="feat">📷 照片標記</span>
      <span class="feat">🗺️ GPX 匯入</span>
      <span class="feat">🎨 手繪風濾鏡</span>
      <span class="feat">📤 高品質匯出</span>
    </div>

    <a class="cta" href="app/">開始使用</a>

    <p class="links">
      <a href="https://github.com/notoriouslab/trailpaint">GitHub</a>
      &nbsp;·&nbsp;
      <a href="trailpaint.html">離線版下載</a>

    NotoriousLab
